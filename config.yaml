model:
  input_size: 1
  num_classes: 10

training:
    seed: 42
    batch_size: 64
    learning_rate: 0.001
    epochs: 20
    log_dir: "runs/mnist_experiment"
    checkpoint_dir: "checkpoints"
    weight_decay: 0.0
    optimizer: adam

    param_grid:
      learning_rate: [0.0001, 0.001, 0.01, 0.1]
      batch_size: [8, 16, 32, 64, 128]

data:
  root: "./data"
  subset_train: 800
  subset_test: 100