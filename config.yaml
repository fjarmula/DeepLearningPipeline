model:
  input_size: 1
  num_classes: 10

training:
    seed: 42
    batch_size: 16
    learning_rate: 0.001
    epochs: 50
    log_dir: "runs/mnist_experiment/default"
    log_dir_grid: "runs/mnist_experiment/grid_search"
    checkpoint_dir: "checkpoints"
    weight_decay: 0.1e-4
    optimizer: sgd
    criterion: cross_entropy

    param_grid:
      learning_rate: [0.0001, 0.001, 0.01, 0.1]
      batch_size: [8, 16, 32, 64, 128]

data:
  root: "./data"
  subset_train: 60000
  subset_test: 10000